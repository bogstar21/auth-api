<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password — auth-api</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --green: #00ff88;
            --green-dim: #00cc6a;
            --green-dark: #003322;
            --bg: #0a0a0a;
            --text: #e0e0e0;
            --muted: #555;
            --error: #ff4444;
        }

        body {
            background: #050505;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Share Tech Mono', monospace;
            padding: 24px;
        }

        .terminal {
            background: var(--bg);
            color: var(--text);
            width: 100%;
            max-width: 480px;
            border: 1px solid #222;
            border-radius: 6px;
            overflow: hidden;
            box-shadow: 0 0 60px rgba(0, 255, 136, 0.04);
        }

        .titlebar {
            background: #111;
            border-bottom: 1px solid #222;
            padding: 10px 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }

        .dot-r {
            background: #ff5f57;
        }

        .dot-y {
            background: #febc2e;
        }

        .dot-g {
            background: #28c840;
        }

        .titlebar-text {
            flex: 1;
            text-align: center;
            font-size: 12px;
            color: var(--muted);
            letter-spacing: 2px;
        }

        .body {
            padding: 28px 32px;
        }

        .prompt-line {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 24px;
        }

        .prompt-symbol {
            color: var(--green);
            font-size: 14px;
        }

        .prompt-path {
            color: var(--green-dim);
            font-size: 13px;
        }

        .cursor {
            display: inline-block;
            width: 8px;
            height: 14px;
            background: var(--green);
            animation: blink 1s infinite;
            vertical-align: middle;
            margin-left: 2px;
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.2;
            }
        }

        .field {
            margin-bottom: 16px;
        }

        .field-label {
            font-size: 11px;
            color: var(--muted);
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 6px;
            display: block;
        }

        .field-wrap {
            display: flex;
            align-items: center;
            border: 1px solid #222;
            background: #0d0d0d;
            border-radius: 2px;
            transition: border-color 0.15s;
        }

        .field-wrap:focus-within {
            border-color: var(--green);
        }

        .field-prefix {
            padding: 0 10px;
            color: var(--green);
            font-size: 13px;
            border-right: 1px solid #222;
            height: 40px;
            display: flex;
            align-items: center;
        }

        .field-input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            padding: 10px 12px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 13px;
            color: var(--text);
            width: 100%;
        }

        .field-input::placeholder {
            color: #333;
        }

        .btn {
            width: 100%;
            padding: 12px;
            background: transparent;
            border: 1px solid var(--green);
            color: var(--green);
            font-family: 'Share Tech Mono', monospace;
            font-size: 13px;
            letter-spacing: 3px;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 2px;
            margin-top: 8px;
            transition: all 0.15s;
        }

        .btn:hover {
            background: var(--green-dark);
        }

        .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .output {
            margin-top: 20px;
            border: 1px solid #1a1a1a;
            background: #0d0d0d;
            border-radius: 2px;
            padding: 14px;
            font-size: 12px;
            line-height: 1.8;
            display: none;
        }

        .output.visible {
            display: block;
        }

        .out-success {
            color: var(--green);
        }

        .out-error {
            color: var(--error);
        }

        .status-bar {
            margin-top: 20px;
            padding: 8px 0 0;
            border-top: 1px solid #1a1a1a;
            display: flex;
            gap: 16px;
            font-size: 11px;
            color: var(--muted);
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--green);
            display: inline-block;
            margin-right: 5px;
            animation: blink 1.5s infinite;
        }
    </style>
</head>

<body>
    <div class="terminal">
        <div class="titlebar">
            <div class="dot dot-r"></div>
            <div class="dot dot-y"></div>
            <div class="dot dot-g"></div>
            <div class="titlebar-text">auth-api — reset password</div>
        </div>
        <div class="body">
            <div class="prompt-line">
                <span class="prompt-symbol">➜</span>
                <span class="prompt-path">~/auth-api/reset</span>
                <span class="cursor"></span>
            </div>

            <div class="field">
                <span class="field-label">new password</span>
                <div class="field-wrap">
                    <span class="field-prefix">#</span>
                    <input class="field-input" type="password" id="new-pass" placeholder="••••••••••••">
                </div>
            </div>
            <div class="field">
                <span class="field-label">confirm password</span>
                <div class="field-wrap">
                    <span class="field-prefix">#</span>
                    <input class="field-input" type="password" id="confirm-pass" placeholder="••••••••••••">
                </div>
            </div>

            <button class="btn" onclick="doReset(event)">[ set new password ]</button>
            <div class="output" id="output"></div>

            <div class="status-bar">
                <span><span class="status-dot"></span>secure reset</span>
            </div>
        </div>
    </div>

    <script>
        // Extract token from URL ?token=xxxx
        const params = new URLSearchParams(window.location.search)
        const token = params.get('token')

        if (!token) {
            const out = document.getElementById('output')
            out.classList.add('visible')
            out.innerHTML = '<span class="out-error">✗ Invalid or missing reset token</span>'
            document.querySelector('.btn').disabled = true
        }

        async function doReset(e) {
            const password = document.getElementById('new-pass').value
            const confirm = document.getElementById('confirm-pass').value
            const out = document.getElementById('output')
            const btn = e.target

            if (!password || !confirm) return

            if (password !== confirm) {
                out.classList.add('visible')
                out.innerHTML = '<span class="out-error">✗ Passwords do not match</span>'
                return
            }

            btn.disabled = true
            btn.textContent = '[ processing... ]'

            try {
                const res = await fetch('/auth/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, password })
                })
                const data = await res.json()
                out.classList.add('visible')
                if (res.ok) {
                    out.innerHTML = '<span class="out-success">✓ Password updated. You can now login.</span>'
                    btn.textContent = '[ done ]'
                } else {
                    out.innerHTML = `<span class="out-error">✗ ${data.error}</span>`
                    btn.disabled = false
                    btn.textContent = '[ set new password ]'
                }
            } catch (err) {
                out.classList.add('visible')
                out.innerHTML = `<span class="out-error">✗ ${err.message}</span>`
                btn.disabled = false
                btn.textContent = '[ set new password ]'
            }
        }
    </script>
</body>

</html>
